apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: e-com
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ModiniPadmaSree/ecom-k8s.git
    targetRevision: HEAD
    path: ecom-chart
    helm: 
     valueFiles:
       - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: e-com

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
