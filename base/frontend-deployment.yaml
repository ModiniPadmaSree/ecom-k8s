apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: e-com
spec:
  replicas: 2
  strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: modinipadmasree/ecom-frontend:3
          imagePullPolicy: Always          
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"


---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: e-com
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
